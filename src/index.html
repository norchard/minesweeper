<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Minesweeper</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <!-- <link rel="stylesheet" href="./assets/style.css"> -->
    <style>
      body {
        font-family: 'Roboto', sans-serif;
      }
      .cell {
        background-color: coral;
        border: solid 1px black;
        height: 20px;
        width: 20px;
        float: left;
      }

      .board {
        margin: 40px auto;
        border: solid 1px black;
      }

      .none {
        display: none;
      }

      .small {
        height: calc(3 * 22px);
        width: calc(3 * 22px);
      }

      .medium {
        height: calc(6 * 22px);
        width: calc(6 * 22px);
      }

      .large {
        height: calc(9 * 22px);
        width: calc(9 * 22px);
      }
    </style>
  </head>
  <body>
    <div id="root">

    </div>
  </body>
</html>
