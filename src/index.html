<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Minesweeper</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto" rel="stylesheet">
    <!-- <link rel="stylesheet" href="./assets/style.css"> -->
    <style>
      body {
        margin-top: 100px;
        font-family: 'Roboto', sans-serif;
      }
      .cell {
        background-color: tomato;
        border: solid 1px black;
        height: 20px;
        width: 24px;
        float: left;
        line-height: 18px;
        padding-top: 4px;
      }

      .guessed {
        background-color: lightsalmon;
      }

      .board {
        margin: 40px auto;
        border: solid 1px black;
      }

      .none {
        display: none;
      }

      .small {
        height: calc(3 * 26px);
        width: calc(3 * 26px);
      }

      .medium {
        height: calc(6 * 26px);
        width: calc(6 * 26px);
      }

      .large {
        height: calc(9 * 26px);
        width: calc(9 * 26px);
      }
    </style>
  </head>
  <body>
    <div id="root">

    </div>
  </body>
</html>
